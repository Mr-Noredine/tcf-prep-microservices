# ═══════════════════════════════════════════════════
# RBAC - Auth Service
# ═══════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-service-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-service-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: auth-service-sa
    namespace: default
roleRef:
  kind: Role
  name: auth-service-role
  apiGroup: rbac.authorization.k8s.io

